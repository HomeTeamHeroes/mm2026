<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MM 2026 · Vedot</title>
<style>
  :root {
    /* High-contrast dark palette — no grays, no low-opacity anything */
    --bg:         #000000;
    --surface:    #111111;
    --surface2:   #1a1a1a;
    --border:     #333333;
    --text:       #ffffff;
    --text-sec:   #ffffff;
    --green:      #00e64d;
    --green-bg:   #003315;
    --green-dim:  #00b33c;
    --red:        #ff3333;
    --red-bg:     #330000;
    --red-dim:    #cc2200;
    --yellow:     #ffcc00;
    --yellow-bg:  #332900;
    --blue:       #4db8ff;
    --blue-bg:    #002233;
    --blue-dim:   #0099dd;
    --radius:     10px;
    --radius-sm:  6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom, 1.5rem);
    font-size: 15px;
    line-height: 1.4;
  }

  /* ── ANIMATED BORDER MIXIN ──────────────────────────────────────────── */
  @property --_a { syntax: "<angle>"; initial-value: 0deg; inherits: false; }
  @keyframes spin-border { to { --_a: 360deg; } }

  .ab {
    position: relative;
    border: none !important;
  }
  .ab::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: var(--ab-w, 2px);
    border-radius: inherit;
    background: conic-gradient(from var(--_a),
      var(--ab-c1), var(--ab-c2), var(--ab-c3), var(--ab-c2), var(--ab-c1));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude;
    pointer-events: none;
    z-index: 0;
    animation: spin-border var(--ab-speed, 4s) linear infinite;
  }

  /* Color presets */
  .ab-gray   { --ab-c1:#222; --ab-c2:#666; --ab-c3:#aaa; }
  .ab-white  { --ab-c1:#444; --ab-c2:#fff; --ab-c3:#ccc; }
  .ab-green  { --ab-c1:#003310; --ab-c2:#00e64d; --ab-c3:#00ff66; }
  .ab-red    { --ab-c1:#330000; --ab-c2:#ff3333; --ab-c3:#ff6666; }
  .ab-blue   { --ab-c1:#001a2e; --ab-c2:#4db8ff; --ab-c3:#99d6ff; }
  .ab-yellow { --ab-c1:#332200; --ab-c2:#ffcc00; --ab-c3:#ffe066; }
  .ab-slow { --ab-speed: 8.75s; }
  .ab-fast { --ab-speed: 8s; }

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  .header {
    background: #111111;
    border-bottom: none;
    padding-top: calc(0.9rem + env(safe-area-inset-top, 0px));
    padding-bottom: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    padding: 0 1rem 0.75rem;
    max-width: 540px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
    gap: 0.5rem;
  }

  .header h1 {
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
  }

  .bankroll-pill {
    background: var(--yellow-bg);
    border: 2px solid var(--yellow);
    border-radius: 999px;
    padding: 0.25rem 0.65rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--yellow);
    white-space: nowrap;
  }
  .bankroll-pill span { color: var(--text); font-weight: 400; margin-right: 0.2rem; font-size: 0.7rem; }

  /* ── STATS BAR ──────────────────────────────────────────────────────── */
  .stats {
    display: flex;
    gap: 0.4rem;
    overflow: visible;
  }

  .stat {
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.35rem 0.4rem;
    white-space: nowrap;
    flex: 1;
    background: var(--surface2);
    text-align: center;
  }
  .stat-label { color: var(--text-sec); display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .stat-value { font-size: 0.95rem; font-weight: 800; color: var(--text); display: block; }
  .stat.green { border-color: var(--green); background: var(--green-bg); }
  .stat.green .stat-value { color: var(--green); }
  .stat.red   { border-color: var(--red);   background: var(--red-bg); }
  .stat.red   .stat-value { color: var(--red); }
  .stat.blue  { border-color: var(--blue);  background: var(--blue-bg); }
  .stat.blue  .stat-value { color: var(--blue); }
  .stat.yellow { border-color: var(--yellow); background: var(--yellow-bg); }
  .stat.yellow .stat-value { color: var(--yellow); }

  /* ── FILTERS ────────────────────────────────────────────────────────── */
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
    padding: 0.65rem 1rem 0;
  }

  .filter-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 0.5rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-sec);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    width: 100%;
  }
  .filter-btn.active {
    background: rgba(255, 255, 255, 0.5);
    color: #ffffff;
    --ab-c1: #888;
    --ab-c2: #fff;
    --ab-c3: #ddd;
  }
  .filter-btn[data-filter="oikein"].active {
    background: rgba(0, 230, 77, 0.5);
    color: #ffffff;
    --ab-c1: #003310;
    --ab-c2: #00e64d;
    --ab-c3: #00ff66;
  }
  .filter-btn[data-filter="vaarin"].active {
    background: rgba(255, 51, 51, 0.5);
    color: #ffffff;
    --ab-c1: #330000;
    --ab-c2: #ff3333;
    --ab-c3: #ff6666;
  }

  /* ── CARD LIST ──────────────────────────────────────────────────────── */
  .cards {
    padding: 0.65rem 0.75rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  /* ── CARD ───────────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card.oikein   { border-color: var(--green); }
  .card.vaarin   { border-color: var(--red); }
  .card.pending  { border-color: var(--border); }
  .card.veikattu { border-color: transparent; position: relative; --ab-c1:#444; --ab-c2:#fff; --ab-c3:#ccc; }

  /* Header shader divider */
  .header-divider {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-top: 0;
  }
  .card.scenario { border-color: var(--blue); }

  /* Card head */
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.45rem 0.75rem 0.4rem;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .card.oikein .card-head  { background: var(--green-bg); border-color: var(--green); }
  .card.vaarin .card-head  { background: var(--red-bg);   border-color: var(--red); }
  .card.scenario .card-head { background: var(--blue-bg); border-color: var(--blue); }

  .card-datetime {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 800;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex-shrink: 0;
    border: 1.5px solid transparent;
  }
  .badge.oikein   { background: var(--green);  color: #000; border-color: var(--green); }
  .badge.vaarin   { background: var(--red);    color: #fff; border-color: var(--red); }
  .badge.pending  { background: transparent;   color: var(--text); border-color: var(--border); }
  .badge.veikattu { background: transparent;   color: var(--text); border-color: var(--text); }
  .badge.extra    { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .badge.scenario { background: var(--blue);   color: #000; border-color: var(--blue); }

  /* Card body */
  .card-body { padding: 0.55rem 0.75rem 0.5rem; }

  .ottelu {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem 0.75rem;
  }

  .field { display: flex; flex-direction: column; gap: 2px; }

  .field-label {
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .field-value {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .field-value.green  { color: var(--green); }
  .field-value.red    { color: var(--red); }
  .field-value.blue   { color: var(--blue); }
  .field-value.dim    { color: var(--text-sec); }

  /* Card foot */
  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.22rem 0.75rem 0.27rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    gap: 0.5rem;
  }
  .card.oikein .card-foot { border-color: var(--green); }
  .card.vaarin .card-foot { border-color: var(--red); }

  .bankroll-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .bankroll-value {
    font-size: 1.14rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--yellow);
  }

  /* ── SCENARIO SECTION ───────────────────────────────────────────────── */
  .scenario-section {
    border-top: 2px solid var(--blue);
    padding: 0.5rem 0.75rem 0.6rem;
    background: var(--blue-bg);
  }
  .scenario-label {
    font-size: 0.6rem;
    font-weight: 800;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.45rem;
  }
  .scenario-matches { display: flex; flex-direction: column; gap: 0.3rem; }
  .scenario-match-row {
    display: flex;
    align-items: baseline;
    gap: 0.45rem;
    font-size: 0.76rem;
    line-height: 1.35;
  }
  .sm-time    { color: var(--text-sec); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .sm-ottelu  { color: var(--text); flex: 1; min-width: 0; }
  .sm-ennuste { color: var(--blue); white-space: nowrap; flex-shrink: 0; font-weight: 700; }

  /* ── EMPTY ──────────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    color: var(--text-sec);
    padding: 3rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
  @media (min-width: 500px) {
    body { font-size: 16px; }
    .cards    { padding: 0.75rem 1rem 0; max-width: 540px; margin: 0 auto; }
    .filters  { padding: 0.7rem 1rem 0; max-width: 540px; margin: 0 auto; grid-template-columns: repeat(4, 1fr); }
    .ottelu   { font-size: 1rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 1rem; }
  }
</style>
</head>

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
  const rows = [];
  for (const line of lines) {
    if (!line[0] || line[0] === 'Pvm' || line[0] === 'Bankroll') continue;
    const panos   = parseFloat(line[5]);
    const kerroin = parseFloat(line[6]);
    const vtp     = parseFloat(line[7]);
    const pankki  = parseFloat(line[8]);
    rows.push({
      pvm:     line[0] || '',
      klo:     line[1] || '',
      ottelu:  line[2] || '',
      ennuste: line[3] || '',
      tulos:   line[4] || '',
      panos:   isNaN(panos)   ? null : panos,
      kerroin: isNaN(kerroin) ? null : kerroin,
      vtp:     isNaN(vtp)     ? null : vtp,
      pankki:  isNaN(pankki)  ? null : pankki,
    });
  }
  return rows;
}

// Map Finnish date strings (e.g. "13.6.") to weekday names
const WEEKDAYS = ['Sunnuntai','Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai'];
function weekday(pvm) {
  if (!pvm) return '';
  const parts = pvm.replace(/\.$/, '').split('.');
  if (parts.length < 2) return pvm;
  const d = new Date(2026, parseInt(parts[1]) - 1, parseInt(parts[0]));
  return WEEKDAYS[d.getDay()];
}

function fmt(n, sign = false) {
  if (n == null) return '—';
  const s = Math.abs(n).toFixed(2).replace('.', ',') + ' €';
  if (sign) return (n >= 0 ? '+' : '−') + s;
  return (n < 0 ? '−' : '') + s;
}

function buildScenario(rows) {
  const lastSettled = [...rows].reverse().find(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  const currentBank = lastSettled ? lastSettled.pankki : STARTING_BANKROLL;
  const undecided = rows.filter(r => !r.tulos && r.panos != null && r.kerroin != null && !r.ottelu.startsWith('Extraveto'));
  if (!undecided.length) return null;
  let bank = currentBank, totalVtp = 0;
  for (const r of undecided) {
    totalVtp += r.panos * r.kerroin - r.panos;
    bank = bank - r.panos + r.panos * r.kerroin;
  }
  return { currentBank, totalVtp, finalBankroll: bank, matches: undecided };
}

let currentFilter = 'all', allRows = [];

function buildStats(rows) {
  const played  = rows.filter(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  const oikein  = played.filter(r => r.tulos === 'Oikein');
  const vaarin  = played.filter(r => r.tulos === 'Väärin');
  const pending = rows.filter(r => !r.tulos);
  const lastPankki = [...rows].reverse().find(r => r.pankki != null);
  const current = lastPankki ? lastPankki.pankki : STARTING_BANKROLL;
  const diff = current - STARTING_BANKROLL;

  document.getElementById('bankrollPill').innerHTML =
    `<span>Pankki</span>${current.toFixed(2).replace('.', ',')} €`;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat blue ab ab-blue ab-slow"><span class="stat-label">Pelejä</span><span class="stat-value">${played.length}/${rows.length}</span></div>
    <div class="stat green ab ab-green ab-slow"><span class="stat-label">Oikein</span><span class="stat-value">${oikein.length}</span></div>
    <div class="stat red ab ab-red ab-slow"><span class="stat-label">Väärin</span><span class="stat-value">${vaarin.length}</span></div>
    <div class="stat ${diff >= 0 ? 'green ab ab-green' : 'red ab ab-red'} ab-slow"><span class="stat-label">Muutos</span><span class="stat-value">${diff >= 0 ? '+' : ''}${diff.toFixed(2).replace('.', ',')} €</span></div>
  `;
}

function renderScenarioCard(s) {
  const matchRows = s.matches.map(m => `
    <div class="scenario-match-row">
      <span class="sm-time">${m.pvm}${m.klo ? ' ' + m.klo : ''}</span>
      <span class="sm-ottelu">${m.ottelu}</span>
      ${m.ennuste ? `<span class="sm-ennuste">${m.ennuste}</span>` : ''}
    </div>`).join('');
  return `
<div class="card scenario">
  <div class="card-head">
    <span class="card-datetime">Skenaario · veikatut ${s.matches.length} tulevaa ottelu${s.matches.length !== 1 ? 'a' : ''}</span>
    <span class="badge scenario">Jos kaikki oikein</span>
  </div>
  <div class="card-body">
    <div class="ottelu">Jos veikatut ottelut menevät kaikki oikein</div>
    <div class="card-grid">
      <div class="field">
        <span class="field-label">Voitto yhteensä</span>
        <span class="field-value green">+${s.totalVtp.toFixed(2).replace('.', ',')} €</span>
      </div>
      <div class="field">
        <span class="field-label">Pankki lopussa</span>
        <span class="field-value blue">${s.finalBankroll.toFixed(2).replace('.', ',')} €</span>
      </div>
    </div>
  </div>
  <div class="scenario-section">
    <div class="scenario-label">Veikatut ottelut (${s.matches.length})</div>
    <div class="scenario-matches">${matchRows}</div>
  </div>
</div>`;
}

function renderCards(rows, filter) {
  const container = document.getElementById('cards');
  let filtered;
  if      (filter === 'oikein')  filtered = rows.filter(r => r.tulos === 'Oikein');
  else if (filter === 'vaarin')  filtered = rows.filter(r => r.tulos === 'Väärin');
  else if (filter === 'played')  filtered = rows.filter(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  else if (filter === 'pending') filtered = rows.filter(r => !r.tulos);
  else filtered = rows;

  const showScenario = false;
  const scenario = null;

  const matchCards = filtered.map(r => {
    const isOikein = r.tulos === 'Oikein';
    const isVaarin = r.tulos === 'Väärin';
    const isExtra  = r.ottelu.startsWith('Extraveto');
    const isVeikattu = !r.tulos && r.panos != null && r.kerroin != null;
    const cardClass  = isOikein ? 'oikein' : isVaarin ? 'vaarin' : isVeikattu ? 'veikattu' : 'pending';
    const badgeClass = isOikein ? 'oikein' : isVaarin ? 'vaarin' : isExtra ? 'extra' : isVeikattu ? 'veikattu' : 'pending';
    const badgeText  = isOikein ? '✓ OIKEIN' : isVaarin ? '✗ VÄÄRIN' : isExtra ? 'EXTRAVETO' : isVeikattu ? 'VEIKATTU' : 'TULOSSA';
    if (isExtra) {
      return `
<div class="card pending">
  <div class="card-head">
    <span class="card-datetime">Extraveto</span>
    <span class="badge extra">EXTRAVETO</span>
  </div>
  <div class="card-body">
    <div class="ottelu" style="text-transform:none;font-size:0.9rem;font-weight:600">Extraveto: kisojen paras maalintekijä: Dembele (Ranska) x 10€ = 260€ jos oikein</div>
  </div>
</div>`;
    }

    const vtpNet   = r.vtp == null ? null : (isOikein && r.panos != null ? r.vtp - r.panos : r.vtp);
    const vtpColor = vtpNet == null ? 'dim' : vtpNet >= 0 ? 'green' : 'red';
    const vtpText  = vtpNet == null ? '—' : fmt(vtpNet, true);
    const abClass = isOikein ? 'ab ab-green ab-slow' : isVaarin ? 'ab ab-red ab-slow' : isVeikattu ? 'ab ab-white ab-slow' : '';
    return `
<div class="card ${cardClass} ${abClass}">
  <div class="card-head">
    <span class="card-datetime">${r.pvm ? weekday(r.pvm) + ' ' + r.pvm : ''}${r.klo ? ' klo ' + r.klo : ''}</span>
    <span class="badge ${badgeClass}">${badgeText}</span>
  </div>
  <div class="card-body">
    <div class="ottelu">${r.ottelu.toUpperCase()}</div>
    <div class="card-grid">
      <div class="field">
        <span class="field-label">VEIKATTU</span>
        <span class="field-value${isOikein ? ' green' : isVaarin ? ' red' : ''}" style="text-transform:uppercase;text-decoration:underline">${r.ennuste || '—'}</span>
      </div>
      <div class="field">
        <span class="field-label">Voitto / tappio</span>
        <span class="field-value ${vtpColor}">${vtpText}</span>
      </div>
      <div class="field">
        <span class="field-label">Panos</span>
        <span class="field-value dim">${r.ennuste && r.panos != null ? r.panos.toFixed(2).replace('.', ',') + ' €' : '—'}</span>
      </div>
      <div class="field">
        <span class="field-label">Kerroin</span>
        <span class="field-value">${r.kerroin != null ? r.kerroin.toFixed(2) : '—'}</span>
      </div>
    </div>
  </div>
  <div class="card-foot">
    <span class="bankroll-label">Pankki tämän jälkeen</span>
    <span class="bankroll-value">${r.pankki != null && r.tulos ? r.pankki.toFixed(2).replace('.', ',') + ' €' : '<span style="color:var(--yellow)">?</span>'}</span>
  </div>
</div>`;
  });

  if (!matchCards.length && !scenario) {
    container.innerHTML = '<div class="empty">Ei otteluita tässä näkymässä.</div>';
    return;
  }
  container.innerHTML = (scenario ? renderScenarioCard(scenario) : '') + matchCards.join('');
}

function recalcPankki(rows) {
  let bank = STARTING_BANKROLL;
  return rows.map(r => {
    const settled = r.tulos === 'Oikein' || r.tulos === 'Väärin';
    if (settled && r.panos != null) {
      if (r.tulos === 'Oikein' && r.kerroin != null) {
        bank = bank - r.panos + r.panos * r.kerroin;
      } else if (r.tulos === 'Väärin') {
        bank = bank - r.panos;
      }
      return { ...r, pankki: Math.round(bank * 100) / 100 };
    }
    return { ...r, pankki: settled ? r.pankki : null };
  });
}

function render(rows) {
  allRows = recalcPankki(rows);
  buildStats(rows);
  renderCards(rows, currentFilter);
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderCards(allRows, currentFilter);
});

async function loadData() {
  if (SHEET_CSV_URL) {
    try {
      const res = await fetch(SHEET_CSV_URL + '&cachebust=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length > 0) { render(rows); return; }
    } catch(e) {
      console.warn('CSV fetch failed, using baked data', e);
    }
  }
  render(BAKED);
}

loadData();
