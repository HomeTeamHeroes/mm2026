<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MM 2026 · Vedot</title>
<style>
  :root {
    /* High-contrast dark palette — no grays, no low-opacity anything */
    --bg:         #000000;
    --surface:    #111111;
    --surface2:   #1a1a1a;
    --border:     #333333;
    --text:       #ffffff;
    --text-sec:   #ffffff;
    --green:      #00e64d;
    --green-bg:   #003315;
    --green-dim:  #00b33c;
    --red:        #ff3333;
    --red-bg:     #330000;
    --red-dim:    #cc2200;
    --yellow:     #ffcc00;
    --yellow-bg:  #332900;
    --blue:       #4db8ff;
    --blue-bg:    #002233;
    --blue-dim:   #0099dd;
    --radius:     10px;
    --radius-sm:  6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom, 1.5rem);
    font-size: 15px;
    line-height: 1.4;
  }

  /* ── ANIMATED BORDER MIXIN ──────────────────────────────────────────── */
  @property --_a { syntax: "<angle>"; initial-value: 0deg; inherits: false; }
  @keyframes spin-border { to { --_a: 360deg; } }

  .ab {
    position: relative;
    border: none !important;
  }
  .ab::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: var(--ab-w, 2px);
    border-radius: inherit;
    background: conic-gradient(from var(--_a),
      var(--ab-c1), var(--ab-c2), var(--ab-c3), var(--ab-c2), var(--ab-c1));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude;
    pointer-events: none;
    z-index: 0;
    animation: spin-border var(--ab-speed, 4s) linear infinite;
  }

  /* Color presets */
  .ab-gray   { --ab-c1:#222; --ab-c2:#666; --ab-c3:#aaa; }
  .ab-white  { --ab-c1:#444; --ab-c2:#fff; --ab-c3:#ccc; }
  .ab-green  { --ab-c1:#003310; --ab-c2:#00e64d; --ab-c3:#00ff66; }
  .ab-red    { --ab-c1:#330000; --ab-c2:#ff3333; --ab-c3:#ff6666; }
  .ab-blue   { --ab-c1:#001a2e; --ab-c2:#4db8ff; --ab-c3:#99d6ff; }
  .ab-yellow { --ab-c1:#332200; --ab-c2:#ffcc00; --ab-c3:#ffe066; }
  .ab-slow { --ab-speed: 8.75s; }
  .ab-fast { --ab-speed: 8s; }

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  .header {
    background: #111111;
    border-bottom: none;
    padding-top: calc(0.9rem + env(safe-area-inset-top, 0px));
    padding-bottom: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    padding: 0 1rem 0.75rem;
    max-width: 540px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
    gap: 0.5rem;
  }

  .header h1 {
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
  }

  .bankroll-pill {
    background: var(--yellow-bg);
    border: 2px solid var(--yellow);
    border-radius: 999px;
    padding: 0.25rem 0.65rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--yellow);
    white-space: nowrap;
  }
  .bankroll-pill span { color: var(--text); font-weight: 400; margin-right: 0.2rem; font-size: 0.7rem; }

  /* ── STATS BAR ──────────────────────────────────────────────────────── */
  .stats {
    display: flex;
    gap: 0.4rem;
    overflow: visible;
  }

  .stat {
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.35rem 0.4rem;
    white-space: nowrap;
    flex: 1;
    background: var(--surface2);
    text-align: center;
  }
  .stat-label { color: var(--text-sec); display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .stat-value { font-size: 0.95rem; font-weight: 800; color: var(--text); display: block; }
  .stat.green { border-color: var(--green); background: var(--green-bg); }
  .stat.green .stat-value { color: var(--green); }
  .stat.red   { border-color: var(--red);   background: var(--red-bg); }
  .stat.red   .stat-value { color: var(--red); }
  .stat.blue  { border-color: var(--blue);  background: var(--blue-bg); }
  .stat.blue  .stat-value { color: var(--blue); }
  .stat.yellow { border-color: var(--yellow); background: var(--yellow-bg); }
  .stat.yellow .stat-value { color: var(--yellow); }

  /* ── FILTERS ────────────────────────────────────────────────────────── */
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
    padding: 0.65rem 1rem 0;
  }

  .filter-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 0.5rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-sec);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    width: 100%;
  }
  .filter-btn.active {
    background: rgba(255, 255, 255, 0.5);
    color: #ffffff;
    --ab-c1: #888;
    --ab-c2: #fff;
    --ab-c3: #ddd;
  }
  .filter-btn[data-filter="oikein"].active {
    background: rgba(0, 230, 77, 0.5);
    color: #ffffff;
    --ab-c1: #003310;
    --ab-c2: #00e64d;
    --ab-c3: #00ff66;
  }
  .filter-btn[data-filter="vaarin"].active {
    background: rgba(255, 51, 51, 0.5);
    color: #ffffff;
    --ab-c1: #330000;
    --ab-c2: #ff3333;
    --ab-c3: #ff6666;
  }

  /* ── CARD LIST ──────────────────────────────────────────────────────── */
  .cards {
    padding: 0.65rem 0.75rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  /* ── CARD ───────────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card.oikein   { border-color: var(--green); }
  .card.vaarin   { border-color: var(--red); }
  .card.pending  { border-color: var(--border); }
  .card.veikattu { border-color: transparent; position: relative; --ab-c1:#444; --ab-c2:#fff; --ab-c3:#ccc; }

  /* Header shader divider */
  .header-divider {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-top: 0;
  }
  .card.scenario { border-color: var(--blue); }

  /* Card head */
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.45rem 0.75rem 0.4rem;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .card.oikein .card-head  { background: var(--green-bg); border-color: var(--green); }
  .card.vaarin .card-head  { background: var(--red-bg);   border-color: var(--red); }
  .card.scenario .card-head { background: var(--blue-bg); border-color: var(--blue); }

  .card-datetime {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 800;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex-shrink: 0;
    border: 1.5px solid transparent;
  }
  .badge.oikein   { background: var(--green);  color: #000; border-color: var(--green); }
  .badge.vaarin   { background: var(--red);    color: #fff; border-color: var(--red); }
  .badge.pending  { background: transparent;   color: var(--text); border-color: var(--border); }
  .badge.veikattu { background: transparent;   color: var(--text); border-color: var(--text); }
  .badge.extra    { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .badge.scenario { background: var(--blue);   color: #000; border-color: var(--blue); }

  /* Card body */
  .card-body { padding: 0.55rem 0.75rem 0.5rem; }

  .ottelu {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem 0.75rem;
  }

  .field { display: flex; flex-direction: column; gap: 2px; }

  .field-label {
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .field-value {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .field-value.green  { color: var(--green); }
  .field-value.red    { color: var(--red); }
  .field-value.blue   { color: var(--blue); }
  .field-value.dim    { color: var(--text-sec); }

  /* Card foot */
  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.22rem 0.75rem 0.27rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    gap: 0.5rem;
  }
  .card.oikein .card-foot { border-color: var(--green); }
  .card.vaarin .card-foot { border-color: var(--red); }

  .bankroll-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .bankroll-value {
    font-size: 1.14rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--yellow);
  }

  /* ── SCENARIO SECTION ───────────────────────────────────────────────── */
  .scenario-section {
    border-top: 2px solid var(--blue);
    padding: 0.5rem 0.75rem 0.6rem;
    background: var(--blue-bg);
  }
  .scenario-label {
    font-size: 0.6rem;
    font-weight: 800;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.45rem;
  }
  .scenario-matches { display: flex; flex-direction: column; gap: 0.3rem; }
  .scenario-match-row {
    display: flex;
    align-items: baseline;
    gap: 0.45rem;
    font-size: 0.76rem;
    line-height: 1.35;
  }
  .sm-time    { color: var(--text-sec); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .sm-ottelu  { color: var(--text); flex: 1; min-width: 0; }
  .sm-ennuste { color: var(--blue); white-space: nowrap; flex-shrink: 0; font-weight: 700; }

  /* ── EMPTY ──────────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    color: var(--text-sec);
    padding: 3rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* ── CHART ──────────────────────────────────────────────────────────── */
  .chart-wrap {
    padding: 0.65rem 0.75rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  #bankChart {
    width: 100%;
    border-radius: var(--radius);
    display: block;
  }
  .chart-footer {
    font-size: 0.75rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.03em;
    padding-bottom: 0.1rem;
  }

  /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
  @media (min-width: 500px) {
    body { font-size: 16px; }
    .cards      { padding: 0.75rem 1rem 0; max-width: 540px; margin: 0 auto; }
    .filters    { padding: 0.7rem 1rem 0; max-width: 540px; margin: 0 auto; grid-template-columns: repeat(4, 1fr); }
    .chart-wrap { padding: 0.65rem 1rem 0; max-width: 540px; margin: 0 auto; }
    .ottelu     { font-size: 1rem; }
    .stat-label { font-size: 0.7rem; }
    .stat-value { font-size: 1rem; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <h1>⚽ MM 2026 · Vedot</h1>
      <div class="bankroll-pill ab ab-yellow ab-slow" id="bankrollPill"><span>Pankki</span>—</div>
    </div>
    <div class="stats" id="statsBar"></div>
  </div>
  <div class="header-divider"></div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn ab ab-gray ab-slow active" data-filter="all">KAIKKI</button>
  <button class="filter-btn ab ab-gray ab-slow" data-filter="pending">TULOSSA</button>
  <button class="filter-btn ab ab-green ab-slow" data-filter="oikein">✓ OIKEIN</button>
  <button class="filter-btn ab ab-red ab-slow" data-filter="vaarin">✗ VÄÄRIN</button>
</div>

<div class="chart-wrap" id="chartWrap">
  <canvas id="bankChart"></canvas>
  <div class="chart-footer" id="chartFooter"></div>
</div>

<div class="cards" id="cards"></div>


<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_Kbtw9Zt4dCO21MbUd84SckMTwNEsthJ3sDbnv9M9rEhxmIfF3vyFIlUQ5m9F58UEUhw4atkFDY3A/pub?gid=1815299106&single=true&output=csv';
const STARTING_BANKROLL = 230;

const BAKED = [];

// Parse a single CSV line respecting double-quoted fields (which may contain commas)
function parseCSVLine(line) {
  const cells = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }  // escaped quote
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      cells.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  cells.push(cur);
  return cells.map(c => c.trim());
}

// Parse a number that may be Finnish (decimal comma "1,44", minus "−") or plain ("234.4")
function parseFiNum(s) {
  if (s == null) return null;
  let t = String(s).trim();
  if (t === '') return null;
  t = t.replace(/\u2212/g, '-').replace(/\s/g, '');  // unicode minus → '-', strip spaces
  if (t.indexOf(',') !== -1) {
    // Finnish format: comma is the decimal separator, any dots are thousands separators
    t = t.replace(/\./g, '').replace(',', '.');
  }
  // else: plain format with dot decimal — leave as-is
  const n = parseFloat(t);
  return isNaN(n) ? null : n;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).map(parseCSVLine);
  const rows = [];
  for (const line of lines) {
    const first = line[0] || '';
    // Skip the setting rows and the header row; only keep match rows (start with a date like "11.6.")
    if (!/^\d{1,2}\.\d{1,2}\.?$/.test(first)) continue;
    rows.push({
      pvm:     line[0] || '',
      klo:     line[1] || '',
      ottelu:  line[2] || '',
      ennuste: line[3] || '',
      tulos:   line[4] || '',
      panos:   parseFiNum(line[5]),
      kerroin: parseFiNum(line[6]),
      vtp:     parseFiNum(line[7]),
      pankki:  parseFiNum(line[8]),
    });
  }
  return rows;
}

// Map Finnish date strings (e.g. "13.6.") to weekday names
const WEEKDAYS = ['Sunnuntai','Maanantai','Tiistai','Keskiviikko','Torstai','Perjantai','Lauantai'];
function weekday(pvm) {
  if (!pvm) return '';
  const parts = pvm.replace(/\.$/, '').split('.');
  if (parts.length < 2) return pvm;
  const d = new Date(2026, parseInt(parts[1]) - 1, parseInt(parts[0]));
  return WEEKDAYS[d.getDay()];
}

function fmt(n, sign = false) {
  if (n == null) return '—';
  const s = Math.abs(n).toFixed(2).replace('.', ',') + ' €';
  if (sign) return (n >= 0 ? '+' : '−') + s;
  return (n < 0 ? '−' : '') + s;
}

function buildScenario(rows) {
  const lastSettled = [...rows].reverse().find(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  const currentBank = lastSettled ? lastSettled.pankki : STARTING_BANKROLL;
  const undecided = rows.filter(r => !r.tulos && r.panos != null && r.kerroin != null && !r.ottelu.startsWith('Extraveto'));
  if (!undecided.length) return null;
  let bank = currentBank, totalVtp = 0;
  for (const r of undecided) {
    totalVtp += r.panos * r.kerroin - r.panos;
    bank = bank - r.panos + r.panos * r.kerroin;
  }
  return { currentBank, totalVtp, finalBankroll: bank, matches: undecided };
}

let currentFilter = 'all', allRows = [];

function buildStats(rows) {
  const played  = rows.filter(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  const oikein  = played.filter(r => r.tulos === 'Oikein');
  const vaarin  = played.filter(r => r.tulos === 'Väärin');
  const pending = rows.filter(r => !r.tulos);
  const lastPankki = [...rows].reverse().find(r => r.pankki != null);
  const current = lastPankki ? lastPankki.pankki : STARTING_BANKROLL;
  const diff = current - STARTING_BANKROLL;

  document.getElementById('bankrollPill').innerHTML =
    `<span>Pankki</span>${current.toFixed(2).replace('.', ',')} €`;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat blue ab ab-blue ab-slow"><span class="stat-label">Pelejä</span><span class="stat-value">${played.length}/${rows.length}</span></div>
    <div class="stat green ab ab-green ab-slow"><span class="stat-label">Oikein</span><span class="stat-value">${oikein.length}</span></div>
    <div class="stat red ab ab-red ab-slow"><span class="stat-label">Väärin</span><span class="stat-value">${vaarin.length}</span></div>
    <div class="stat ${diff >= 0 ? 'green ab ab-green' : 'red ab ab-red'} ab-slow"><span class="stat-label">Muutos</span><span class="stat-value">${diff >= 0 ? '+' : ''}${diff.toFixed(2).replace('.', ',')} €</span></div>
  `;
}

function renderScenarioCard(s) {
  const matchRows = s.matches.map(m => `
    <div class="scenario-match-row">
      <span class="sm-time">${m.pvm}${m.klo ? ' ' + m.klo : ''}</span>
      <span class="sm-ottelu">${m.ottelu}</span>
      ${m.ennuste ? `<span class="sm-ennuste">${m.ennuste}</span>` : ''}
    </div>`).join('');
  return `
<div class="card scenario">
  <div class="card-head">
    <span class="card-datetime">Skenaario · veikatut ${s.matches.length} tulevaa ottelu${s.matches.length !== 1 ? 'a' : ''}</span>
    <span class="badge scenario">Jos kaikki oikein</span>
  </div>
  <div class="card-body">
    <div class="ottelu">Jos veikatut ottelut menevät kaikki oikein</div>
    <div class="card-grid">
      <div class="field">
        <span class="field-label">Voitto yhteensä</span>
        <span class="field-value green">+${s.totalVtp.toFixed(2).replace('.', ',')} €</span>
      </div>
      <div class="field">
        <span class="field-label">Pankki lopussa</span>
        <span class="field-value blue">${s.finalBankroll.toFixed(2).replace('.', ',')} €</span>
      </div>
    </div>
  </div>
  <div class="scenario-section">
    <div class="scenario-label">Veikatut ottelut (${s.matches.length})</div>
    <div class="scenario-matches">${matchRows}</div>
  </div>
</div>`;
}

function renderCards(rows, filter) {
  const container = document.getElementById('cards');
  let filtered;
  if      (filter === 'oikein')  filtered = rows.filter(r => r.tulos === 'Oikein');
  else if (filter === 'vaarin')  filtered = rows.filter(r => r.tulos === 'Väärin');
  else if (filter === 'played')  filtered = rows.filter(r => r.tulos === 'Oikein' || r.tulos === 'Väärin');
  else if (filter === 'pending') filtered = rows.filter(r => !r.tulos);
  else filtered = rows;

  const showScenario = false;
  const scenario = null;

  const matchCards = filtered.map(r => {
    const isOikein = r.tulos === 'Oikein';
    const isVaarin = r.tulos === 'Väärin';
    const isExtra  = r.ottelu.startsWith('Extraveto');
    const isVeikattu = !r.tulos && r.panos != null && r.kerroin != null;
    const cardClass  = isOikein ? 'oikein' : isVaarin ? 'vaarin' : isVeikattu ? 'veikattu' : 'pending';
    const badgeClass = isOikein ? 'oikein' : isVaarin ? 'vaarin' : isExtra ? 'extra' : isVeikattu ? 'veikattu' : 'pending';
    const badgeText  = isOikein ? '✓ OIKEIN' : isVaarin ? '✗ VÄÄRIN' : isExtra ? 'EXTRAVETO' : isVeikattu ? 'VEIKATTU' : 'TULOSSA';
    if (isExtra) {
      return `
<div class="card pending">
  <div class="card-head">
    <span class="card-datetime">Extraveto</span>
    <span class="badge extra">EXTRAVETO</span>
  </div>
  <div class="card-body">
    <div class="ottelu" style="text-transform:none;font-size:0.9rem;font-weight:600">Extraveto: kisojen paras maalintekijä: Dembele (Ranska) x 10€ = 260€ jos oikein</div>
  </div>
</div>`;
    }

    const vtpColor = r.vtp == null ? 'dim' : r.vtp >= 0 ? 'green' : 'red';
    const vtpText  = r.vtp == null ? '—' : fmt(r.vtp, true);
    const abClass = isOikein ? 'ab ab-green ab-slow' : isVaarin ? 'ab ab-red ab-slow' : isVeikattu ? 'ab ab-white ab-slow' : '';
    return `
<div class="card ${cardClass} ${abClass}">
  <div class="card-head">
    <span class="card-datetime">${r.pvm ? weekday(r.pvm) + ' ' + r.pvm : ''}${r.klo ? ' klo ' + r.klo : ''}</span>
    <span class="badge ${badgeClass}">${badgeText}</span>
  </div>
  <div class="card-body">
    <div class="ottelu">${r.ottelu.toUpperCase()}</div>
    <div class="card-grid">
      <div class="field">
        <span class="field-label">VEIKATTU</span>
        <span class="field-value${isOikein ? ' green' : isVaarin ? ' red' : ''}" style="text-transform:uppercase;text-decoration:underline">${r.ennuste || '—'}</span>
      </div>
      <div class="field">
        <span class="field-label">Voitto / tappio</span>
        <span class="field-value ${vtpColor}">${vtpText}</span>
      </div>
      <div class="field">
        <span class="field-label">Panos</span>
        <span class="field-value dim">${r.ennuste && r.panos != null ? r.panos.toFixed(2).replace('.', ',') + ' €' : '—'}</span>
      </div>
      <div class="field">
        <span class="field-label">Kerroin</span>
        <span class="field-value">${r.kerroin != null ? r.kerroin.toFixed(2) : '—'}</span>
      </div>
    </div>
  </div>
  <div class="card-foot">
    <span class="bankroll-label">Pankki tämän jälkeen</span>
    <span class="bankroll-value">${r.pankki != null ? r.pankki.toFixed(2).replace('.', ',') + ' €' : '<span style="color:var(--yellow)">?</span>'}</span>
  </div>
</div>`;
  });

  if (!matchCards.length && !scenario) {
    container.innerHTML = '<div class="empty">Ei otteluita tässä näkymässä.</div>';
    return;
  }
  container.innerHTML = (scenario ? renderScenarioCard(scenario) : '') + matchCards.join('');
}

function drawChart(rows) {
  const canvas = document.getElementById('bankChart');
  if (!canvas) return;
  const wrap = document.getElementById('chartWrap');
  const W = wrap.clientWidth - 24; // account for padding
  const H = Math.round(W * 0.42);
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  // Colours matching app palette
  const COL_BG      = '#111111';
  const COL_GRID    = '#2a2a2a';
  const COL_AXIS    = '#444444';
  const COL_TEXT    = '#ffffff';
  const COL_ACTUAL  = '#00e64d';   // green — actual line
  const COL_PROJ    = '#4db8ff';   // blue  — projected dotted line
  const COL_START   = '#ffcc00';   // yellow dot at start
  const COL_ZERO    = '#ff3333';   // red reference line if bankroll < start

  const TOTAL_MATCHES = 104;
  const PAD = { top: 18, right: 14, bottom: 32, left: 52 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  // Build data: index 0 = starting bankroll, index N = pankki after match N
  const actual = [STARTING_BANKROLL]; // match 0 = before any match
  rows.forEach(r => {
    if (r.pankki != null && (r.tulos === 'Oikein' || r.tulos === 'Väärin')) {
      actual.push(r.pankki);
    }
  });
  const lastActualIdx = actual.length - 1; // 0-based match index of last known pankki
  const lastBank = actual[lastActualIdx];

  // Projected: straight line from STARTING_BANKROLL (match 0) to lastBank,
  // then extended with same slope to match TOTAL_MATCHES
  // slope = (lastBank - STARTING_BANKROLL) / lastActualIdx  (per match)
  const slope = lastActualIdx > 0 ? (lastBank - STARTING_BANKROLL) / lastActualIdx : 0;
  const projEndBank = STARTING_BANKROLL + slope * TOTAL_MATCHES;

  // Y axis range
  const allVals = [...actual, projEndBank, STARTING_BANKROLL];
  let yMin = Math.min(...allVals);
  let yMax = Math.max(...allVals);
  const yPad = Math.max(20, (yMax - yMin) * 0.12);
  yMin = Math.floor((yMin - yPad) / 10) * 10;
  yMax = Math.ceil( (yMax + yPad) / 10) * 10;
  if (yMin === yMax) { yMin -= 20; yMax += 20; }

  function xPx(matchIdx) { return PAD.left + (matchIdx / TOTAL_MATCHES) * cW; }
  function yPx(val)      { return PAD.top  + (1 - (val - yMin) / (yMax - yMin)) * cH; }

  // Background
  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, W, H);

  // Grid lines + Y labels
  ctx.font = `${Math.round(W * 0.022)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const ySteps = 5;
  for (let i = 0; i <= ySteps; i++) {
    const val = yMin + (yMax - yMin) * (i / ySteps);
    const y = yPx(val);
    ctx.strokeStyle = COL_GRID;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillStyle = COL_TEXT;
    ctx.fillText(Math.round(val) + '€', PAD.left - 6, y);
  }

  // Starting bankroll reference line (yellow dashed)
  const yStart = yPx(STARTING_BANKROLL);
  ctx.strokeStyle = COL_START;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(PAD.left, yStart); ctx.lineTo(W - PAD.right, yStart); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // X axis labels (every 20 matches)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = COL_TEXT;
  ctx.globalAlpha = 0.7;
  for (let i = 0; i <= TOTAL_MATCHES; i += 20) {
    ctx.fillText(i, xPx(i), H - PAD.bottom + 6);
  }
  ctx.globalAlpha = 1;

  // X axis line
  ctx.strokeStyle = COL_AXIS;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.left, H - PAD.bottom);
  ctx.lineTo(W - PAD.right, H - PAD.bottom);
  ctx.stroke();

  // Projected line: full span match 0 → TOTAL_MATCHES, dotted blue
  ctx.strokeStyle = COL_PROJ;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(xPx(0), yPx(STARTING_BANKROLL));
  ctx.lineTo(xPx(TOTAL_MATCHES), yPx(projEndBank));
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Actual line: solid green
  if (actual.length > 1) {
    ctx.strokeStyle = COL_ACTUAL;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    actual.forEach((val, i) => {
      const x = xPx(i);
      const y = yPx(val);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Glow effect on actual line
    ctx.strokeStyle = COL_ACTUAL;
    ctx.lineWidth = 6;
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    actual.forEach((val, i) => {
      const x = xPx(i);
      const y = yPx(val);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Dot at current position
  if (actual.length > 1) {
    const cx = xPx(lastActualIdx);
    const cy = yPx(lastBank);
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fillStyle = COL_ACTUAL;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Dot at start
  ctx.beginPath();
  ctx.arc(xPx(0), yPx(STARTING_BANKROLL), 3, 0, Math.PI * 2);
  ctx.fillStyle = COL_START;
  ctx.fill();

  // Footer: estimated final bankroll
  const diff = projEndBank - STARTING_BANKROLL;
  const sign = diff >= 0 ? '+' : '−';
  const col  = diff >= 0 ? COL_ACTUAL : COL_ZERO;
  const footer = document.getElementById('chartFooter');
  if (footer) {
    footer.innerHTML = `Arvioitu pankki lopussa &nbsp;<span style="color:${col}">${sign}${Math.abs(diff).toFixed(2).replace('.', ',')} €</span>`;
  }
}

function recalcPankki(rows) {
  return rows.map(r => ({
    ...r,
    pankki: (r.pankki != null) ? r.pankki : null
  }));
}

function render(rows) {
  allRows = recalcPankki(rows);
  buildStats(rows);
  drawChart(rows);
  renderCards(rows, currentFilter);
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderCards(allRows, currentFilter);
});

async function loadData() {
  if (SHEET_CSV_URL) {
    try {
      const res = await fetch(SHEET_CSV_URL + '&cachebust=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length > 0) { render(rows); return; }
    } catch(e) {
      console.warn('CSV fetch failed, using baked data', e);
    }
  }
  render(BAKED);
}

loadData();
</script>
